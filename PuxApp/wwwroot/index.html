<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuxApp</title>
</head>
<body>
    <h1>PuxApp</h1>

    <form id="analyseForm">
        <div>
            <label for="directoryPath">Cesta k adresáři:</label>
        </div>

        <div>
            <input type="text"
                   id="directoryPath"
                   name="directoryPath"
                   placeholder="C:\Users" />
        </div>

        <div>
            <button type="submit">Analyzovat</button>
        </div>
    </form>

    <hr />

    <section>
        <h2>Výsledek analýzy</h2>
        <div id="result">Zatím nebyla spuštěna analýza.</div>
    </section>

    <script>
        const form = document.getElementById("analyseForm");
        const pathInput = document.getElementById("directoryPath");
        const result = document.getElementById("result");

        form.addEventListener("submit", async function (event) {
            event.preventDefault();

            const path = pathInput.value.trim();

            if (!path) {
                result.textContent = "Zadejte cestu k adresáři.";
                return;
            }

            try {
                const response = await fetch("/api/analyse", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ path })
                });

                const data = await response.json();

                if (!response.ok) {
                    result.textContent = `Chyba: ${data.error}`;
                    return;
                }

                result.textContent = `${data.message} Zadaná cesta: ${data.path}`;
            } catch {
                result.textContent = "Nepodařilo se vytvořit připojení s backendem.";
            }
        });
    </script>
</body>
</html>
